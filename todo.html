<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ramdhan To-Do List 2026</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Playfair+Display:ital,wght@0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="public/css/style.css" />
    <link rel="stylesheet" href="public/css/todospesifik.css" />
  </head>
  <body>
    <header>
      <div class="header-stars"></div>
      <div class="header-arabic">رَمَضَانُ شَهْرُ الْعِبَادَةِ</div>
      <div class="gold-divider"></div>
      <h1>Ramadhan To-Do List</h1>
      <p class="subtitle">Pantau & tingkatkan konsistensi ibadah harianmu</p>
    </header>

    <nav class="nav-tabs" aria-label="Navigasi halaman">
      <a href="index.html">📿 Doa Ramadhan</a>
      <a href="zikir.html">🌿 Hitung Zikir</a>
      <a href="zakat.html">🕌 Kalkulator Zakat</a>
      <a href="todo.html" class="active">☑️ To-Do Ibadah</a>
    </nav>

    <main>
        <div class="daily-summary">
            <div class="summary-top">
                <div>
                    <div class="summary-title">Progress Ibadah hari ini</div>
                    <div class="summary-date" id="summaryDate">-</div>
                </div>
                <div class="summary-pct" id="summaryPct">0 <span>%</span></div>
            </div>
            <div class="summary-bar-wrap">
                <div class="summary-bar-fill" id="summaryBar"></div>
            </div>
            <div class="summary-status" id="summaryStatus">Mulai catat ibadahmu hari ini 🌙</div>
        </div>
    </main>
  </body>
